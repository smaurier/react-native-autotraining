<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 12 — Networking et API</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 12 — Networking et API</h1>
    <p class="subtitle">fetch, AbortController, Bearer token, retry, TypeScript request types</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Comportement de fetch sur erreur HTTP",
        text: "Que se passe-t-il quand fetch recoit une reponse HTTP 404 ?",
        code: "const response = await fetch('https://api.example.com/users/999');\nconsole.log(response.ok); // ???\nconsole.log(response.status); // ???",
        options: [
          "La Promise est rejetee avec une erreur 'Not Found'",
          "La Promise est resolue, response.ok vaut false et response.status vaut 404",
          "La Promise est resolue, response.ok vaut true et response.status vaut 404",
          "fetch leve une TypeError automatiquement"
        ],
        answer: 1,
        explanation: "fetch ne rejette la Promise que sur les erreurs reseau (pas de connexion, DNS introuvable). Pour les codes HTTP 4xx/5xx, la Promise est resolue normalement. Il faut verifier response.ok (qui est true pour les codes 200-299) ou response.status manuellement. C'est une difference majeure avec Axios qui rejette automatiquement sur les erreurs HTTP."
      },
      {
        label: "Question 2 — AbortController dans useEffect",
        text: "Pourquoi est-il important d'utiliser AbortController dans le cleanup de useEffect ?",
        code: "useEffect(() => {\n  const controller = new AbortController();\n  fetch(url, { signal: controller.signal })\n    .then(r => r.json())\n    .then(setData)\n    .catch(err => {\n      if (err.name !== 'AbortError') throw err;\n    });\n  return () => controller.abort();\n}, [url]);",
        options: [
          "Pour accelerer les requetes en envoyant un signal de priorite au serveur",
          "Pour eviter les mises a jour de state sur un composant demonte et les fuites memoire",
          "Pour permettre a React de mettre en cache la reponse automatiquement",
          "C'est une convention React mais pas strictement necessaire"
        ],
        answer: 1,
        explanation: "Quand un composant est demonte ou que les dependances changent, la requete en cours peut se terminer apres le demontage. Sans annulation, setData() serait appele sur un composant qui n'existe plus, provoquant un warning 'Can't perform a React state update on an unmounted component' et une fuite memoire. AbortController dans le cleanup annule proprement la requete."
      },
      {
        label: "Question 3 — Refresh token et deduplication",
        text: "Si 3 requetes echouent en 401 simultanement, pourquoi faut-il dedupliquer l'appel de refresh token ?",
        code: "// Sans deduplication :\n// Requete A → 401 → refresh() → nouveau token\n// Requete B → 401 → refresh() → ???\n// Requete C → 401 → refresh() → ???",
        options: [
          "Pour economiser de la bande passante, car un refresh token fait 3 appels reseau",
          "Car le refresh token est a usage unique : le 1er appel le consomme, les 2e et 3e echouent avec un token deja utilise",
          "Pour eviter de generer 3 access tokens differents qui se marchent dessus",
          "Ce n'est pas necessaire, chaque refresh retourne le meme resultat"
        ],
        answer: 1,
        explanation: "Les refresh tokens sont generalement a usage unique (one-time use) : une fois utilise pour obtenir un nouveau access token, il est invalide. Si 3 requetes tentent chacune un refresh en parallele, seule la premiere reussit. La deduplication garantit qu'un seul appel de refresh a lieu, et les 3 requetes partagent la meme Promise (et donc le meme nouveau token)."
      },
      {
        label: "Question 4 — Retry avec backoff exponentiel",
        text: "Quel est l'ordre des delais pour un retry avec baseDelay=1000ms et maxRetries=3, et pourquoi ajouter du jitter ?",
        code: "// Tentative 1 (initiale) : echoue\n// Retry 1 : delai = 1000 * 2^0 = 1000ms\n// Retry 2 : delai = 1000 * 2^1 = 2000ms\n// Retry 3 : delai = 1000 * 2^2 = 4000ms",
        options: [
          "1s, 1s, 1s — le jitter rend les delais aleatoires pour tester la resilience du code",
          "1s, 2s, 4s — le jitter disperse les retries dans le temps pour eviter le 'thundering herd'",
          "1s, 2s, 4s — le jitter est ajoute pour des raisons de securite (anti brute-force)",
          "2s, 4s, 8s — le jitter compense les variations de latence reseau"
        ],
        answer: 1,
        explanation: "Le backoff exponentiel (1s, 2s, 4s) espace progressivement les tentatives pour laisser au serveur le temps de recuperer. Le jitter (bruit aleatoire) evite le 'thundering herd' : sans jitter, si 1000 clients echouent au meme instant, ils retentent tous exactement a la meme seconde, re-surchargeant le serveur. Le jitter disperse les retries dans une fenetre temporelle."
      },
      {
        label: "Question 5 — Typage TypeScript des requetes API",
        text: "Quel est l'avantage principal du pattern 'type-map' pour les endpoints API ?",
        code: "interface ApiEndpoints {\n  'GET /posts': {\n    params: { page?: number };\n    response: PaginatedResponse<Post>;\n  };\n  'POST /posts': {\n    body: CreatePostPayload;\n    response: Post;\n  };\n}",
        options: [
          "Il genere automatiquement la documentation Swagger de l'API",
          "Il fournit un typage end-to-end : le compilateur verifie les params, le body et la reponse pour chaque endpoint",
          "Il permet de valider les donnees a l'execution avec un schema JSON",
          "Il optimise les performances en permettant au compilateur d'inline les appels"
        ],
        answer: 1,
        explanation: "Le type-map associe chaque endpoint (methode + path) a ses types de parametres, body et reponse. Quand on appelle api.get<ApiEndpoints['GET /posts']>('/posts', { page: 1 }), TypeScript verifie a la compilation que les params sont corrects et que la reponse est de type PaginatedResponse<Post>. Toute erreur de typage est detectee avant l'execution, eliminant une categorie entiere de bugs."
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    function render() {
      const q = questions[current];
      const pct = ((current) / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = `Question ${current + 1} / ${questions.length}`;
      document.getElementById('scoreContainer').classList.add('hidden');

      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => {
        html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`;
      });
      html += `</ul><button class="btn btn-primary" id="submitBtn" disabled onclick="checkAnswer()">Valider</button>`;
      html += `<div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      answered = false;

      document.querySelectorAll('input[name="q"]').forEach(r => {
        r.addEventListener('change', () => {
          document.getElementById('submitBtn').disabled = false;
        });
      });
    }

    function checkAnswer() {
      if (answered) { next(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[current];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('submitBtn');

      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`;
      }

      document.querySelectorAll('input[name="q"]').forEach(r => { r.disabled = true; });
      btn.textContent = current < questions.length - 1 ? 'Suivante' : 'Voir le score';
    }

    function next() {
      current++;
      if (current < questions.length) { render(); }
      else { showScore(); }
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = `Termine !`;
      const pct = Math.round((score / questions.length) * 100);
      const container = document.getElementById('scoreContainer');
      container.classList.remove('hidden');
      container.innerHTML = `
        <div class="score">${score} / ${questions.length}</div>
        <div class="score-label">${pct}% de bonnes reponses</div>
        <p>${pct >= 80 ? 'Excellent ! Vous maitrisez les appels reseau en React Native.' : pct >= 60 ? 'Bien ! Relisez les sections sur les concepts manques.' : 'Revisez le module 12 avant de continuer.'}</p>
        <button class="btn-restart" onclick="restart()">Recommencer</button>
      `;
    }

    function restart() { current = 0; score = 0; render(); }

    render();
  </script>
</body>
</html>
