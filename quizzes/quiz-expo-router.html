<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — Expo Router : Navigation file-based en React Native</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz — Expo Router</h1>
    <p class="subtitle">Navigation file-based, _layout.tsx, routes dynamiques, Link, useRouter, useLocalSearchParams</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1",
        text: "Comment fonctionne le routage file-based dans Expo Router ?",
        code: "app/\n  _layout.tsx\n  index.tsx\n  about.tsx\n  settings/\n    index.tsx\n    profile.tsx",
        options: [
          "Chaque fichier dans le dossier app/ correspond automatiquement a une route, le chemin du fichier determinant l'URL",
          "Il faut declarer manuellement chaque route dans un fichier de configuration central router.config.ts",
          "Le routage file-based necessite un plugin Babel specifique qui analyse les imports au build",
          "Seuls les fichiers nommes page.tsx sont reconnus comme des routes valides"
        ],
        answer: 0,
        explanation: "Expo Router utilise un systeme de routage base sur le systeme de fichiers, inspire de Next.js. Chaque fichier place dans le dossier app/ devient automatiquement une route. Par exemple, app/about.tsx correspond a la route /about, et app/settings/profile.tsx correspond a /settings/profile. Le fichier index.tsx represente la route racine de son dossier."
      },
      {
        label: "Question 2",
        text: "Quel est le role du fichier _layout.tsx dans Expo Router ?",
        code: "// app/_layout.tsx\nimport { Stack } from 'expo-router';\n\nexport default function RootLayout() {\n  return (\n    &lt;Stack&gt;\n      &lt;Stack.Screen name=\"index\" options={{ title: 'Accueil' }} /&gt;\n      &lt;Stack.Screen name=\"about\" options={{ title: 'A propos' }} /&gt;\n    &lt;/Stack&gt;\n  );\n}",
        options: [
          "Il definit les styles globaux de l'application",
          "Il sert uniquement a configurer les meta-donnees SEO de chaque page",
          "Il definit la mise en page partagee (layout) et le type de navigation (Stack, Tabs, Drawer) pour les routes enfants de son dossier",
          "Il est obligatoire mais ne peut contenir que des composants de navigation React Navigation"
        ],
        answer: 2,
        explanation: "Le fichier _layout.tsx definit un layout persistant qui enveloppe toutes les routes enfants de son repertoire. Il permet de specifier le type de navigateur (Stack, Tabs, Drawer) et de configurer les options d'ecran (titre, en-tetes, animations). Chaque sous-dossier peut avoir son propre _layout.tsx pour creer des layouts imbriques. Le prefixe underscore (_) indique qu'il ne s'agit pas d'une route navigable."
      },
      {
        label: "Question 3",
        text: "Comment definir et exploiter une route dynamique dans Expo Router ?",
        code: "// app/products/[id].tsx\nimport { useLocalSearchParams } from 'expo-router';\n\nexport default function ProductDetail() {\n  const { id } = useLocalSearchParams&lt;{ id: string }&gt;();\n  return &lt;Text&gt;Produit : {id}&lt;/Text&gt;;\n}",
        options: [
          "Les crochets dans le nom du fichier [id].tsx definissent un parametre dynamique, accessible via useLocalSearchParams",
          "Il faut utiliser la syntaxe :id dans le nom du fichier, comme dans Express.js",
          "Les routes dynamiques ne sont possibles qu'avec un fichier de configuration supplementaire",
          "useLocalSearchParams ne fonctionne qu'avec les query strings, pas avec les segments dynamiques"
        ],
        answer: 0,
        explanation: "Dans Expo Router, les crochets dans le nom du fichier (ex: [id].tsx) definissent un segment de route dynamique. Le hook useLocalSearchParams permet de recuperer les parametres de cette route de maniere type-safe. Pour une route /products/42, le parametre id vaudra '42'. On peut aussi utiliser [...slug].tsx pour capturer plusieurs segments (catch-all route)."
      },
      {
        label: "Question 4",
        text: "Quelle est la difference entre le composant Link et le hook useRouter pour la navigation dans Expo Router ?",
        code: "// Methode 1 : Composant declaratif\nimport { Link } from 'expo-router';\n&lt;Link href=\"/products/42\"&gt;Voir le produit&lt;/Link&gt;\n\n// Methode 2 : Navigation imperative\nimport { useRouter } from 'expo-router';\nconst router = useRouter();\nrouter.push('/products/42');",
        options: [
          "Link est plus performant car il pre-charge la route cible, useRouter ne le fait pas",
          "Link est un composant declaratif pour la navigation au clic, tandis que useRouter permet une navigation imperative dans la logique du code (apres validation, appel API, etc.)",
          "useRouter est deprecie en faveur de Link depuis Expo SDK 50",
          "Link ne peut naviguer que vers des routes statiques, useRouter est requis pour les routes dynamiques"
        ],
        answer: 1,
        explanation: "Link est un composant declaratif qui fonctionne comme une ancre cliquable : on l'utilise dans le JSX pour permettre a l'utilisateur de naviguer au tap. useRouter retourne un objet avec des methodes imperatives (push, replace, back, canGoBack) qui permettent de declencher la navigation dans le code, par exemple apres une soumission de formulaire ou un appel API reussi. Les deux supportent les routes statiques et dynamiques."
      },
      {
        label: "Question 5",
        text: "Quels sont les principaux avantages d'Expo Router par rapport a React Navigation classique ?",
        code: null,
        options: [
          "Expo Router est plus rapide a l'execution car il utilise un moteur de navigation natif different",
          "Expo Router remplace completement React Navigation et n'en depend plus du tout",
          "Expo Router offre un routage file-based automatique, le deep linking universel par defaut, le typage des routes, et le support du rendu web (SSR/SSG) — tout en s'appuyant sur React Navigation en interne",
          "Expo Router ne fonctionne que sur le web et n'est pas recommande pour les applications mobiles natives"
        ],
        answer: 2,
        explanation: "Expo Router s'appuie sur React Navigation en interne mais ajoute plusieurs avantages majeurs : (1) le routage file-based elimine la configuration manuelle des navigateurs, (2) le deep linking fonctionne automatiquement pour chaque route, (3) les routes sont typees statiquement, (4) le support web natif avec SSR/SSG est integre. React Navigation reste pertinent pour des configurations tres personnalisees, mais Expo Router est desormais l'approche recommandee pour les projets Expo."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card">
        <p class="question-label">${q.label}</p>
        <p class="question-text">${q.text}</p>`;
      if (q.code) {
        html += `<pre><code>${q.code}</code></pre>`;
      }
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => {
        html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`;
      });
      html += `</ul>
        <button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>
        <div class="feedback" id="feedback"></div>
      </div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => {
        r.addEventListener('change', () => {
          document.getElementById('validateBtn').disabled = false;
        });
      });
      answered = false;
    }

    function validate() {
      if (answered) {
        currentQuestion++;
        if (currentQuestion < questions.length) {
          renderQuestion();
        } else {
          showScore();
        }
        return;
      }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`;
      }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }

    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = `Termine !`;
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div>
        <div class="score-label">${msg} (${pct}%)</div>
        <button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }

    function restart() {
      currentQuestion = 0; score = 0; answered = false;
      document.getElementById('scoreContainer').classList.add('hidden');
      document.getElementById('quizContainer').classList.remove('hidden');
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
