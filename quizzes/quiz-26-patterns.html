<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 26 — Patterns avances et Monorepo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 26 — Patterns avances et Monorepo</h1>
    <p class="subtitle">Turborepo, pnpm workspaces, design system, CI/CD, code sharing</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 10</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — dependsOn dans Turborepo",
        text: "Que signifie dependsOn: ['^build'] dans turbo.json ?",
        code: "{\n  \"tasks\": {\n    \"build\": {\n      \"dependsOn\": [\"^build\"],\n      \"outputs\": [\"dist/**\"]\n    }\n  }\n}",
        options: [
          "Builder toutes les taches avant celle-ci",
          "Builder d'abord les dependances internes (packages dont on depend) avant ce package",
          "Executer le build en parallele avec les dependances",
          "Ignorer les dependances et builder directement"
        ],
        correct: 1,
        explanation: "Le prefixe ^ dans dependsOn signifie 'les taches upstream' — c'est-a-dire les packages dont le package courant depend. Si @mono/app depend de @mono/ui, alors ^build signifie : builder @mono/ui avant @mono/app. Sans le ^, cela signifierait 'executer build dans le meme package'."
      },
      {
        label: "Question 2 — pnpm et phantom dependencies",
        text: "Pourquoi pnpm est-il prefere a npm/yarn dans un monorepo RN ?",
        code: null,
        options: [
          "pnpm est plus rapide a l'installation uniquement",
          "pnpm utilise un hoisting strict avec symlinks : chaque package ne voit que ses deps declarees, eliminant les phantom dependencies",
          "pnpm supporte les workspaces, npm et yarn non",
          "pnpm genere un lockfile plus petit"
        ],
        correct: 1,
        explanation: "pnpm utilise un content-addressable store et des symlinks pour que chaque package n'ait acces qu'a ses dependances declarees. Avec npm/yarn, les deps 'hoistees' en racine sont accessibles par tous les packages (phantom dependencies), ce qui fonctionne en dev mais casse en production quand la dep n'est pas declaree."
      },
      {
        label: "Question 3 — Metro dans un monorepo",
        text: "Quelle configuration Metro est necessaire pour les packages internes du monorepo ?",
        code: "// apps/mobile/metro.config.js\nconst config = getDefaultConfig(__dirname);\n\nconfig.watchFolders = [ ??? ];",
        options: [
          "Ajouter chaque package individuellement dans watchFolders",
          "Ajouter la racine du monorepo dans watchFolders pour que Metro resolve les packages internes",
          "Pas de configuration necessaire, Metro detecte automatiquement les workspaces",
          "Remplacer Metro par Webpack pour supporter les monorepos"
        ],
        correct: 1,
        explanation: "Metro doit surveiller la racine du monorepo (monorepoRoot) via watchFolders pour resoudre les packages internes (symlinks pnpm). Sans cela, Metro ne trouvera pas les modules dans packages/. Il faut aussi configurer nodeModulesPaths pour eviter les doublons de React."
      },
      {
        label: "Question 4 — Peer dependencies",
        text: "Pourquoi les packages partages declarent-ils react en peerDependencies ?",
        code: "// packages/ui/package.json\n{\n  \"peerDependencies\": {\n    \"react\": \">=18.0.0\",\n    \"react-native\": \">=0.74.0\"\n  }\n}",
        options: [
          "Pour forcer l'installation de la version exacte",
          "Pour eviter d'inclure React en double dans le bundle — l'app hote fournit sa propre version",
          "Pour rendre React optionnel",
          "Pour permettre l'utilisation avec React 17 et 18"
        ],
        correct: 1,
        explanation: "Si packages/ui avait react en dependencies, il y aurait deux copies de React dans le bundle (celle de l'app + celle du package), ce qui causerait des erreurs ('Hooks can only be called inside a component'). Avec peerDependencies, le package utilise la meme instance de React que l'app hote."
      },
      {
        label: "Question 5 — Affected-only builds",
        text: "Que fait cette commande Turborepo ?",
        code: "turbo test --filter=\"...[origin/main]\"",
        options: [
          "Teste tous les packages du monorepo",
          "Teste uniquement les packages modifies depuis origin/main, plus ceux qui en dependent",
          "Teste le package main uniquement",
          "Teste les packages dans l'ordre de la branche main"
        ],
        correct: 1,
        explanation: "Le filtre ...[origin/main] combine deux concepts : ... (inclure les dependants) et [origin/main] (changements depuis cette ref git). Turbo detecte quels fichiers ont change, identifie les packages concernes, puis inclut aussi leurs dependants. Cela reduit le temps CI de 40-60% sur un monorepo typique."
      },
      {
        label: "Question 6 — Design tokens",
        text: "Quel est l'avantage d'avoir les design tokens dans un package dedie (@monorepo/tokens) ?",
        code: "// packages/tokens/src/index.ts\nexport const tokens = {\n  colors: { primary: '#0066FF', ... },\n  spacing: { md: 16, ... },\n  fontSizes: { lg: 17, ... },\n} as const;",
        options: [
          "Les tokens sont automatiquement synchronises avec Figma",
          "Une source unique de verite partagee entre toutes les apps, avec possibilite de generer CSS + RN depuis les memes valeurs",
          "Les tokens sont plus performants dans un package separe",
          "C'est obligatoire pour que TypeScript infere les types"
        ],
        correct: 1,
        explanation: "Un package tokens dedie est la source unique de verite pour le design system. Les memes valeurs peuvent generer des variables CSS (pour le web), des constantes React Native, et des tokens pour d'autres plateformes. Tout changement de couleur ou d'espacement se fait en un seul endroit et se propage automatiquement."
      },
      {
        label: "Question 7 — react-native-web",
        text: "Comment react-native-web permet-il de partager du code entre mobile et web ?",
        code: "// vite.config.ts\nresolve: {\n  alias: { 'react-native': 'react-native-web' },\n  extensions: ['.web.tsx', '.web.ts', '.tsx', '.ts']\n}",
        options: [
          "Il convertit le JSX en HTML natif",
          "Il fournit une implementation web des composants RN (View→div, Text→span) et utilise les extensions .web.tsx pour les surcharges",
          "Il compile React Native en WebAssembly",
          "Il cree un WebView qui execute l'app RN dans le navigateur"
        ],
        correct: 1,
        explanation: "react-native-web re-implemente les API React Native (View, Text, StyleSheet, Pressable, etc.) en utilisant les equivalents DOM (div, span, CSS). Le systeme d'extensions (.web.tsx vs .native.tsx) permet de surcharger des composants specifiques par plateforme tout en partageant >80% du code."
      },
      {
        label: "Question 8 — Remote Cache Turborepo",
        text: "Quel est le role du remote cache dans Turborepo ?",
        code: "turbo build\n# >>> FULL TURBO: packages/tokens build cache hit\n# >>> FULL TURBO: packages/config build cache hit\n# >>> packages/ui: building...",
        options: [
          "Stocker les artifacts de build en CDN pour les utilisateurs",
          "Partager les resultats de build entre developpeurs et CI — si le hash des inputs n'a pas change, reutiliser le resultat",
          "Cacher les dependances npm pour accelerer l'installation",
          "Fournir un cache DNS pour les registres npm"
        ],
        correct: 1,
        explanation: "Le remote cache Turbo (Vercel, S3, ou custom) stocke les resultats de chaque tache indexes par un hash des inputs (code source, deps, env). Si un developpeur ou la CI a deja builde la meme combinaison, le resultat est telecharge au lieu d'etre recalcule. Cela peut diviser le temps de build par 5-10x."
      },
      {
        label: "Question 9 — Module federation mobile",
        text: "Pourquoi le module federation est-il plus complexe en mobile qu'en web ?",
        code: null,
        options: [
          "Les mobiles n'ont pas acces au reseau",
          "Il n'y a pas de module federation natif dans Metro — il faut Re.pack (Webpack pour RN) ou un pattern mini-app",
          "React Native ne supporte pas le code splitting",
          "Le module federation necessite JavaScript, pas TypeScript"
        ],
        correct: 1,
        explanation: "En web, Webpack 5 a le module federation integre. Metro (le bundler RN) n'a pas cette fonctionnalite. Les alternatives sont Re.pack (qui utilise Webpack pour RN avec le ModuleFederationPlugin) ou le pattern 'mini-app' avec un registre de features et du lazy loading. Chaque approche a des compromis de complexite et de performance."
      },
      {
        label: "Question 10 — Hoisting et React Native",
        text: "Pourquoi configure-t-on des public-hoist-pattern pour React Native dans .npmrc ?",
        code: "# .npmrc\nshamefully-hoist=false\npublic-hoist-pattern[]=react\npublic-hoist-pattern[]=react-native\npublic-hoist-pattern[]=expo",
        options: [
          "Pour accelerer l'installation de ces packages",
          "Parce que Metro et les outils RN s'attendent a trouver react/react-native a la racine des node_modules — le hoisting strict de pnpm les rendrait invisibles",
          "Pour permettre l'acces global a React dans les tests",
          "Pour eviter les conflits de version entre packages"
        ],
        correct: 1,
        explanation: "Metro et certains outils React Native (comme les plugins Babel) resolvent les modules en cherchant dans node_modules de maniere classique. Avec le hoisting strict de pnpm, ces packages seraient caches dans le store .pnpm et introuvables. Les public-hoist-pattern les remontent a la racine pour la compatibilite, tout en gardant le strict mode pour les autres packages."
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    function renderQuestion() {
      const q = questions[currentQuestion];
      const container = document.getElementById('quizContainer');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');

      progressBar.style.width = `${((currentQuestion) / questions.length) * 100}%`;
      progressText.textContent = `Question ${currentQuestion + 1} / ${questions.length}`;

      let html = `<div class="card">`;
      html += `<p class="question-label">${q.label}</p>`;
      html += `<p class="question-text">${q.text}</p>`;
      if (q.code) {
        html += `<pre><code>${q.code}</code></pre>`;
      }
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => {
        html += `<li><label><input type="radio" name="q${currentQuestion}" value="${i}" ${answered ? 'disabled' : ''}> ${opt}</label></li>`;
      });
      html += `</ul>`;
      html += `<button class="btn btn-primary" id="submitBtn" ${answered ? 'disabled' : ''} onclick="checkAnswer()">Valider</button>`;
      html += `<div id="feedback" class="feedback"></div>`;
      html += `</div>`;

      container.innerHTML = html;
      answered = false;
    }

    function checkAnswer() {
      if (answered) return;
      const selected = document.querySelector(`input[name="q${currentQuestion}"]:checked`);
      if (!selected) return;

      answered = true;
      const answer = parseInt(selected.value);
      const q = questions[currentQuestion];
      const feedback = document.getElementById('feedback');
      const submitBtn = document.getElementById('submitBtn');

      document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(r => r.disabled = true);
      submitBtn.disabled = true;

      if (answer === q.correct) {
        score++;
        feedback.className = 'feedback correct';
        feedback.innerHTML = `<strong>Correct !</strong> ${q.explanation}`;
      } else {
        feedback.className = 'feedback wrong';
        feedback.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`;
      }

      setTimeout(() => {
        currentQuestion++;
        if (currentQuestion < questions.length) {
          renderQuestion();
        } else {
          showScore();
        }
      }, 3500);
    }

    function showScore() {
      const container = document.getElementById('quizContainer');
      const scoreContainer = document.getElementById('scoreContainer');
      const progressBar = document.getElementById('progressBar');

      container.innerHTML = '';
      progressBar.style.width = '100%';
      document.getElementById('progressText').textContent = `Termine !`;

      const pct = Math.round((score / questions.length) * 100);
      let msg = '';
      if (pct === 100) msg = 'Parfait ! Vous maitrisez les patterns monorepo.';
      else if (pct >= 80) msg = 'Excellent ! Quelques details a revoir.';
      else if (pct >= 60) msg = 'Bien ! Relisez les sections sur les points manques.';
      else msg = 'Continuez a pratiquer — relisez le module 26.';

      scoreContainer.className = 'card score-card';
      scoreContainer.innerHTML = `
        <div class="score">${score} / ${questions.length}</div>
        <div class="score-label">${pct}% — ${msg}</div>
        <button class="btn-restart" onclick="restart()">Recommencer</button>
      `;
    }

    function restart() {
      currentQuestion = 0;
      score = 0;
      answered = false;
      document.getElementById('scoreContainer').className = 'card score-card hidden';
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
