<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 09 — Navigation avancee</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 09 — Navigation avancee</h1>
    <p class="subtitle">Tabs, drawer, imbrication, deep linking, auth flow, shared transitions</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 6</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Navigateurs imbriques",
        text: "Quel est le pattern recommande pour combiner des tabs avec des stacks dans React Navigation ?",
        code: "// Architecture :\n// RootStack\n//   MainTabs\n//     HomeTab (Stack)\n//       HomeList\n//       HomeDetails\n//     SearchTab (Stack)\n//       SearchMain\n//       SearchResults",
        options: [
          "Mettre tous les ecrans dans un seul Stack Navigator et cacher les tabs manuellement",
          "Chaque tab contient son propre Stack Navigator, le tout encapsule dans un RootStack pour les modales",
          "Utiliser uniquement des tabs sans stack, en changeant le contenu dynamiquement",
          "Creer un navigateur custom qui combine tabs et stacks"
        ],
        answer: 1,
        explanation: "Le pattern recommande est d'imbriquer un Stack Navigator dans chaque tab. Chaque tab gere sa propre pile de navigation. Un RootStack encapsule le TabNavigator pour gerer les ecrans modaux qui s'affichent au-dessus des tabs. Il faut penser a mettre headerShown: false sur les tabs pour eviter le double header."
      },
      {
        label: "Question 2 — Deep linking configuration",
        text: "Comment React Navigation fait-il correspondre une URL a un ecran ?",
        code: "const linking = {\n  prefixes: ['myapp://', 'https://myapp.com'],\n  config: {\n    screens: {\n      MainTabs: {\n        screens: {\n          HomeTab: {\n            screens: {\n              HomeDetails: 'item/:id',\n            },\n          },\n        },\n      },\n    },\n  },\n};\n\n// URL : myapp://item/42",
        options: [
          "Il compare l'URL caractere par caractere avec le nom de l'ecran",
          "Il utilise la config linking.config.screens qui mappe des patterns d'URL (avec :param) a des ecrans, en suivant la hierarchie des navigateurs imbriques",
          "Il convertit automatiquement les noms d'ecrans en URLs sans configuration",
          "Il necessite un serveur backend pour resoudre les URLs"
        ],
        answer: 1,
        explanation: "La config de deep linking definit un arbre de screens qui reflete la hierarchie des navigateurs. Chaque ecran est associe a un pattern d'URL. Les segments prefixes par : sont des parametres dynamiques (ex: :id). React Navigation parcourt cette config pour trouver l'ecran correspondant a l'URL et extrait les parametres."
      },
      {
        label: "Question 3 — Auth flow",
        text: "Quel est le pattern recommande pour gerer l'authentification avec React Navigation ?",
        code: "function RootNavigator() {\n  const { isLoggedIn } = useAuth();\n\n  return (\n    <Stack.Navigator>\n      {isLoggedIn ? (\n        <>\n          <Stack.Screen name=\"Home\" component={HomeScreen} />\n          <Stack.Screen name=\"Profile\" component={ProfileScreen} />\n        </>\n      ) : (\n        <>\n          <Stack.Screen name=\"Login\" component={LoginScreen} />\n          <Stack.Screen name=\"Register\" component={RegisterScreen} />\n        </>\n      )}\n    </Stack.Navigator>\n  );\n}",
        options: [
          "Naviguer vers Login avec navigate() quand le token expire",
          "Utiliser des ecrans conditionnels : les screens affiches dependent de l'etat isLoggedIn, React Navigation gere automatiquement la transition",
          "Creer deux NavigationContainer separes et basculer entre eux",
          "Mettre tous les ecrans dans le meme navigator et verifier l'auth dans chaque ecran"
        ],
        answer: 1,
        explanation: "Le pattern declaratif est recommande : les ecrans affiches sont conditionnes par isLoggedIn. React Navigation detecte le changement et anime automatiquement la transition (animation 'pop' pour login -> home). Ce pattern est robuste car l'utilisateur ne peut jamais naviguer vers un ecran auth depuis un ecran non-auth et vice-versa."
      },
      {
        label: "Question 4 — Tab badges",
        text: "Comment afficher un badge (compteur) sur un onglet du Bottom Tab Navigator ?",
        code: "const cartCount = useCartStore((s) => s.items.length);\n\n<Tab.Screen\n  name=\"Cart\"\n  component={CartScreen}\n  options={{\n    tabBarBadge: ???,\n    tabBarBadgeStyle: {\n      backgroundColor: '#ff3b30',\n    },\n  }}\n/>",
        options: [
          "tabBarBadge n'existe pas, il faut creer un composant custom",
          "tabBarBadge: cartCount — il accepte un nombre ou une string, et undefined pour masquer le badge",
          "Il faut utiliser tabBarIcon pour afficher le badge manuellement",
          "Les badges ne sont disponibles que sur iOS"
        ],
        answer: 1,
        explanation: "La prop tabBarBadge accepte un nombre, une string, ou undefined. Quand la valeur est undefined, le badge est masque. On utilise souvent tabBarBadge: cartCount > 0 ? cartCount : undefined pour n'afficher le badge que quand il y a des items. tabBarBadgeStyle permet de personnaliser l'apparence."
      },
      {
        label: "Question 5 — Shared element transitions",
        text: "Comment fonctionnent les shared element transitions dans React Navigation 7 ?",
        code: "// Ecran liste\n<SharedElement id={`product.${item.id}.image`}>\n  <Image source={{ uri: item.image }} />\n</SharedElement>\n\n// Ecran details\n<SharedElement id={`product.${id}.image`}>\n  <Image source={{ uri: product.image }} />\n</SharedElement>",
        options: [
          "React Navigation teleporte le composant d'un ecran a l'autre",
          "Les SharedElement avec le meme id sur deux ecrans creent une animation fluide ou l'element semble se deplacer d'un ecran a l'autre pendant la transition",
          "Il faut manuellement animer la position avec Animated.Value",
          "Les shared transitions ne fonctionnent que sur Android"
        ],
        answer: 1,
        explanation: "Les SharedElement transitions identifient les elements avec le meme id sur deux ecrans differents. Pendant la transition entre ecrans, React Navigation anime la position, la taille et l'opacite de ces elements pour creer l'illusion d'un deplacement fluide. C'est un pattern courant dans les listes vers details (ex: photo de produit)."
      },
      {
        label: "Question 6 — Navigation entre navigateurs imbriques",
        text: "Comment naviguer depuis un ecran dans HomeTab vers un ecran dans ProfileTab ?",
        code: "// Architecture :\n// MainTabs\n//   HomeTab -> HomeList (ecran actuel)\n//   ProfileTab -> ProfileMain -> EditProfile\n\n// On veut aller a EditProfile depuis HomeList",
        options: [
          "navigation.navigate('EditProfile') — React Navigation trouve automatiquement le bon tab",
          "navigation.navigate('ProfileTab', { screen: 'EditProfile' }) — il faut specifier la hierarchie des navigateurs",
          "C'est impossible de naviguer entre tabs differents",
          "Il faut d'abord navigation.goBack() puis navigation.navigate('ProfileTab')"
        ],
        answer: 1,
        explanation: "Pour naviguer vers un ecran dans un navigateur imbrique, il faut specifier le chemin complet : d'abord le nom du tab, puis l'ecran cible via la prop screen. On peut aussi passer des params. React Navigation s'occupe de basculer vers le bon tab et d'empiler l'ecran."
      }
    ];

    let current = 0;
    let score = 0;

    function render() {
      const container = document.getElementById('quizContainer');
      const q = questions[current];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((current / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${current + 1} / ${total}`;

      container.innerHTML = `
        <div class="card">
          <p class="question-label">${q.label}</p>
          <p class="question-text">${q.text}</p>
          ${q.code ? `<pre><code>${q.code}</code></pre>` : ''}
          <ul class="options">
            ${q.options.map((opt, i) => `
              <li>
                <label>
                  <input type="radio" name="q${current}" value="${i}">
                  ${opt}
                </label>
              </li>
            `).join('')}
          </ul>
          <button class="btn btn-primary" id="submitBtn" onclick="submit()" disabled>Valider</button>
          <div class="feedback" id="feedback"></div>
        </div>
      `;

      container.querySelectorAll('input[type="radio"]').forEach(r => {
        r.addEventListener('change', () => {
          document.getElementById('submitBtn').disabled = false;
        });
      });
    }

    function submit() {
      const selected = document.querySelector(`input[name="q${current}"]:checked`);
      if (!selected) return;

      const answer = parseInt(selected.value);
      const q = questions[current];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('submitBtn');

      document.querySelectorAll(`input[name="q${current}"]`).forEach(r => r.disabled = true);
      btn.disabled = true;

      if (answer === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`;
      }

      setTimeout(() => {
        current++;
        if (current < questions.length) {
          render();
        } else {
          showScore();
        }
      }, 4000);
    }

    function showScore() {
      const total = questions.length;
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      document.getElementById('quizContainer').classList.add('hidden');

      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');

      const pct = Math.round((score / total) * 100);
      const emoji = pct === 100 ? '&#127942;' : pct >= 70 ? '&#128077;' : '&#128170;';

      sc.innerHTML = `
        <div class="score">${score} / ${total}</div>
        <div class="score-label">${pct}% ${emoji}</div>
        <p>${pct >= 70 ? 'Bravo ! Vous maitrisez la navigation avancee.' : 'Revisez le module 09 et reessayez !'}</p>
        <button class="btn-restart" onclick="restart()">Recommencer</button>
      `;
    }

    function restart() {
      current = 0;
      score = 0;
      document.getElementById('scoreContainer').classList.add('hidden');
      document.getElementById('quizContainer').classList.remove('hidden');
      render();
    }

    render();
  </script>
</body>
</html>
