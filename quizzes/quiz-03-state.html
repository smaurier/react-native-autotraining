<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 03 — State et cycle de vie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 03 — State et cycle de vie</h1>
    <p class="subtitle">useState, immutabilite, useEffect, dependency array, stale closures, useRef</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Immutabilite avec useState",
        text: "Pourquoi ce code ne declenche-t-il PAS de re-render quand on appelle handleAdd ?",
        code: "const [items, setItems] = useState(['a', 'b']);\n\nconst handleAdd = () => {\n  items.push('c');\n  setItems(items);\n};",
        options: [
          "useState ne fonctionne pas avec les tableaux",
          "push() mute le tableau existant, et setItems recoit la meme reference — React ne detecte aucun changement",
          "Il faut appeler forceUpdate() apres setItems",
          "Le composant est mal configure, il faut utiliser useReducer"
        ],
        answer: 1,
        explanation: "React compare les references (Object.is) pour detecter les changements. push() mute le tableau en place sans changer sa reference. setItems(items) passe la meme reference, donc React considere que rien n'a change. La solution : setItems([...items, 'c']) cree un nouveau tableau avec une nouvelle reference."
      },
      {
        label: "Question 2 — useEffect cleanup",
        text: "Quand la fonction de cleanup retournee par useEffect est-elle executee ?",
        code: "useEffect(() => {\n  const id = setInterval(() => {\n    console.log('tick');\n  }, 1000);\n\n  return () => clearInterval(id);  // cleanup\n}, []);",
        options: [
          "Uniquement au montage du composant",
          "A chaque render, avant que l'effet ne s'execute",
          "Au demontage du composant, et avant chaque re-execution de l'effet quand les deps changent",
          "Uniquement quand on appelle manuellement la fonction de cleanup"
        ],
        answer: 2,
        explanation: "Le cleanup s'execute dans deux situations : (1) avant la re-execution de l'effet quand les dependances changent, et (2) au demontage du composant. Avec un dependency array vide [], le cleanup ne s'execute qu'au demontage car l'effet ne se re-execute jamais. C'est le mecanisme pour nettoyer les timers, subscriptions et abort controllers."
      },
      {
        label: "Question 3 — Dependency array",
        text: "Que se passe-t-il avec ce useEffect et pourquoi ?",
        code: "function SearchResults({ query }) {\n  const [results, setResults] = useState([]);\n  const options = { limit: 10, sort: 'relevance' };\n\n  useEffect(() => {\n    fetchResults(query, options).then(setResults);\n  }, [query, options]);\n\n  return <FlatList data={results} ... />;\n}",
        options: [
          "Le code fonctionne parfaitement, l'effet s'execute quand query change",
          "Boucle infinie : options est un nouvel objet a chaque render, donc la dep change a chaque fois, ce qui re-declenche l'effet",
          "L'effet ne s'execute jamais car options n'est pas un type primitif",
          "Erreur de compilation : les objets ne sont pas acceptes dans le dependency array"
        ],
        answer: 1,
        explanation: "A chaque render, const options = { limit: 10, sort: 'relevance' } cree un nouvel objet avec une nouvelle reference. React compare les deps avec Object.is, qui compare les references pour les objets. Nouvelle reference = dep changee = effet re-execute = setState = re-render = boucle infinie. Solutions : extraire en constante hors du composant, utiliser useMemo, ou lister les valeurs primitives comme deps."
      },
      {
        label: "Question 4 — Stale closures",
        text: "Quelle valeur affiche le console.log dans cet intervalle, et pourquoi ?",
        code: "function Counter() {\n  const [count, setCount] = useState(0);\n\n  useEffect(() => {\n    const id = setInterval(() => {\n      console.log(count); // Qu'affiche-t-il ?\n      setCount(count + 1);\n    }, 1000);\n    return () => clearInterval(id);\n  }, []);\n\n  return <Text>{count}</Text>;\n}",
        options: [
          "0, 1, 2, 3, ... (incremente normalement)",
          "Toujours 0 — c'est une stale closure, count est capture a sa valeur initiale",
          "NaN car count n'est pas defini dans la closure",
          "Erreur runtime car setCount ne peut pas etre appele dans un intervalle"
        ],
        answer: 1,
        explanation: "C'est le piege classique de la stale closure. Le useEffect avec [] capture count a sa valeur au montage (0). La fonction de l'intervalle utilise cette valeur figee : count est toujours 0 dans la closure. Le console.log affiche 0 en boucle, et setCount(0 + 1) met count a 1 a chaque tick. La solution : utiliser le setter fonctionnel setCount(prev => prev + 1) qui recoit toujours la valeur la plus recente."
      },
      {
        label: "Question 5 — useRef vs useState",
        text: "Quelle est la difference fondamentale entre useRef et useState ?",
        code: "const countRef = useRef(0);    // vs\nconst [count, setCount] = useState(0);",
        options: [
          "useRef est plus rapide que useState pour toutes les operations",
          "useRef ne persiste pas entre les renders, contrairement a useState",
          "Modifier countRef.current ne declenche PAS de re-render, contrairement a setCount qui re-rend le composant",
          "useRef ne peut stocker que des references DOM, pas des valeurs arbitraires"
        ],
        answer: 2,
        explanation: "C'est LA difference fondamentale : useRef.current peut etre modifie sans declencher de re-render. useState via son setter declenche un re-render. Les deux persistent entre les renders. useRef est ideal pour les valeurs qui n'affectent pas le rendu visuel : timer IDs, compteurs internes, valeurs precedentes, references DOM. useState est pour les donnees qui doivent etre affichees."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
