<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 07 — Composants UI avances</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 07 — Composants UI avances</h1>
    <p class="subtitle">Pressable, Modal, KeyboardAvoidingView, compound components et accessibilite</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 6</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Pressable vs TouchableOpacity",
        text: "Quel avantage majeur de Pressable par rapport a TouchableOpacity justifie la migration ?",
        code: "// TouchableOpacity\n<TouchableOpacity onPress={onPress} activeOpacity={0.7}>\n  <Text>Ancien</Text>\n</TouchableOpacity>\n\n// Pressable\n<Pressable\n  onPress={onPress}\n  style={({ pressed }) => [styles.btn, pressed && styles.btnPressed]}\n>\n  {({ pressed }) => <Text>{pressed ? 'Appuye' : 'Normal'}</Text>}\n</Pressable>",
        options: [
          "Pressable est plus rapide car il utilise le thread natif directement",
          "Pressable accepte une fonction pour style ET children, permettant un feedback visuel dynamique illimite (pas juste l'opacite), plus android_ripple et pressRetentionOffset",
          "Pressable supporte automatiquement les gestes complexes (swipe, pinch)",
          "TouchableOpacity et Pressable sont equivalents, la migration est purement cosmetique"
        ],
        answer: 1,
        explanation: "Pressable offre une API bien plus riche : style et children en render function (feedback visuel dynamique), android_ripple natif, hitSlop, pressRetentionOffset et unstable_pressDelay. TouchableOpacity ne propose que le changement d'opacite."
      },
      {
        label: "Question 2 — Modal onRequestClose",
        text: "Que se passe-t-il si vous ne definissez pas onRequestClose sur un Modal visible sur Android ?",
        code: "<Modal visible={true} animationType=\"slide\">\n  <View>\n    <Text>Contenu de la modale</Text>\n    <Button title=\"Fermer\" onPress={() => setVisible(false)} />\n  </View>\n</Modal>\n// L'utilisateur appuie sur le bouton retour hardware...",
        options: [
          "La modale se ferme automatiquement grace au comportement par defaut d'Android",
          "Le bouton retour hardware n'a aucun effet — l'utilisateur est bloque dans la modale sans pouvoir la fermer autrement qu'en cliquant le bouton Fermer",
          "L'application crash avec une erreur fatale",
          "Android affiche un dialogue de confirmation natif"
        ],
        answer: 1,
        explanation: "Sans onRequestClose, le bouton retour hardware d'Android ne fait rien quand une Modal est visible. L'utilisateur ne peut fermer la modale qu'en utilisant les controles internes. C'est un bug UX frequent — toujours definir onRequestClose pour fermer la modale."
      },
      {
        label: "Question 3 — KeyboardAvoidingView behavior",
        text: "Pourquoi le behavior de KeyboardAvoidingView doit-il varier par plateforme ?",
        code: "<KeyboardAvoidingView\n  behavior={Platform.OS === 'ios' ? 'padding' : 'height'}\n  style={{ flex: 1 }}\n>",
        options: [
          "iOS et Android ont le meme comportement de clavier, la distinction est inutile",
          "iOS et Android gerent differemment le redimensionnement de la fenetre quand le clavier apparait : 'padding' fonctionne mieux sur iOS, 'height' sur Android",
          "Le behavior 'height' n'existe pas sur iOS",
          "C'est une convention de la communaute sans justification technique"
        ],
        answer: 1,
        explanation: "Sur iOS, le clavier se superpose a la fenetre sans la redimensionner, donc 'padding' ajoute de l'espace en bas. Sur Android, la fenetre est souvent redimensionnee (windowSoftInputMode), donc 'height' ajuste la hauteur du conteneur. Le mauvais behavior par plateforme cause des doubles compensations ou aucune compensation."
      },
      {
        label: "Question 4 — Compound Components",
        text: "Quel mecanisme React permet aux sous-composants (Select.Option) de communiquer avec le parent (Select) sans props explicites ?",
        code: "<Select value={value} onChange={onChange}>\n  <Select.Option value=\"FR\">France</Select.Option>\n  <Select.Option value=\"BE\">Belgique</Select.Option>\n</Select>",
        options: [
          "Les props sont transmises automatiquement par React.cloneElement()",
          "Un Context React interne partage : le parent fournit un Provider, les enfants consomment le contexte avec useContext()",
          "Les sous-composants accedent aux props du parent via this.parent en interne",
          "Le pattern utilise les refs pour communiquer entre parent et enfants"
        ],
        answer: 1,
        explanation: "Le pattern Compound Components utilise un Context React interne. Le composant parent (Select) fournit un Provider avec la valeur selectionnee et le callback onChange. Chaque sous-composant (Select.Option) consomme ce contexte via useContext() pour savoir s'il est selectionne et declencher le changement."
      },
      {
        label: "Question 5 — Accessibilite",
        text: "Quelles proprietes d'accessibilite sont essentielles pour un bouton toggle (switch) ?",
        code: "function Toggle({ value, onToggle, label }) {\n  return (\n    <Pressable onPress={() => onToggle(!value)}>\n      <View style={value ? styles.on : styles.off} />\n    </Pressable>\n  );\n}\n// Que manque-t-il pour l'accessibilite ?",
        options: [
          "Seulement accessibilityLabel suffit, les autres proprietes sont optionnelles",
          "accessibilityRole='switch', accessibilityLabel={label} et accessibilityState={{ checked: value }} pour que le lecteur d'ecran annonce correctement l'etat",
          "Il faut ajouter un composant Text visible a cote du toggle",
          "L'accessibilite est geree automatiquement par React Native"
        ],
        answer: 1,
        explanation: "Pour un toggle, le lecteur d'ecran a besoin de : accessibilityRole='switch' (annonce 'bouton a bascule'), accessibilityLabel (ce que fait le toggle), et accessibilityState={{ checked: value }} (annonce 'active' ou 'desactive'). Sans ces props, VoiceOver/TalkBack ne peut pas communiquer l'etat du toggle."
      },
      {
        label: "Question 6 — hitSlop",
        text: "Un bouton icone fait 24x24 points. Quelle est la bonne pratique pour sa zone tactile ?",
        code: "<Pressable\n  onPress={onPress}\n  hitSlop={???}\n  style={{ width: 24, height: 24 }}\n>\n  <Icon name=\"close\" size={24} />\n</Pressable>",
        options: [
          "hitSlop n'est pas necessaire, 24x24 est suffisant pour le tactile",
          "hitSlop={10} pour atteindre 44x44 points, la taille cible minimale recommandee par Apple et Google pour une zone tactile confortable",
          "hitSlop={100} pour couvrir tout l'ecran",
          "Il faut agrandir l'icone a 44x44 au lieu d'utiliser hitSlop"
        ],
        answer: 1,
        explanation: "Apple recommande 44x44pt et Google 48x48dp comme taille minimale de zone tactile. Un element de 24x24 a besoin de (44-24)/2 = 10pt de hitSlop de chaque cote pour atteindre 44x44. hitSlop agrandit la zone tactile sans modifier la taille visuelle."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
