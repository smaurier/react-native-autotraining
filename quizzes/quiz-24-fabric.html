<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 24 — New Architecture : Fabric et JSI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 24 — New Architecture : Fabric et JSI</h1>
    <p class="subtitle">Shadow tree, host objects, concurrent rendering, migration</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — JSI Host Objects",
        text: "Qu'est-ce qu'un Host Object dans le contexte de JSI ?",
        code: "class BatteryHostObject : public HostObject {\npublic:\n    Value get(Runtime& runtime, const PropNameID& name) override {\n        if (name.utf8(runtime) == \"level\") {\n            return Value(0.85);\n        }\n        return Value::undefined();\n    }\n};",
        options: [
          "Un objet JavaScript ordinaire stocke dans le heap JS",
          "Un objet C++ expose directement dans le runtime JavaScript via JSI, accessible sans serialisation et en memoire partagee",
          "Un objet JSON envoye via le Bridge entre JS et le natif",
          "Un composant React Native avec des props natives"
        ],
        answer: 1,
        explanation: "Un Host Object est un objet C++ qui implemente l'interface HostObject de JSI. Il est expose directement dans le runtime JavaScript : quand JS accede a une propriete, la methode get() C++ est appelee synchroniquement, sans serialisation JSON ni passage par le Bridge. C'est la base de la communication JSI."
      },
      {
        label: "Question 2 — Shadow Tree",
        text: "Quel est le role du Shadow Tree dans l'architecture Fabric ?",
        code: null,
        options: [
          "C'est une copie du DOM HTML utilisee pour le virtual DOM",
          "C'est une representation intermediaire en C++ de l'arbre de composants, ou le layout est calcule par Yoga et les mutations sont calculees avant d'etre appliquees aux vues natives",
          "C'est un arbre de fichiers sur le disque qui contient les assets de l'application",
          "C'est un mecanisme de cache pour les images"
        ],
        answer: 1,
        explanation: "Le Shadow Tree est une structure de donnees C++ qui represente l'arbre de vues. Fabric cree un ShadowNode pour chaque composant React, calcule le layout via Yoga (C++), puis compare l'ancien et le nouveau Shadow Tree pour produire la liste minimale de mutations (create, delete, update, insert) a appliquer aux vues natives. Tout cela se fait en C++, pas en JS."
      },
      {
        label: "Question 3 — Layout synchrone",
        text: "Pourquoi le layout synchrone de Fabric elimine-t-il le 'layout flash' ?",
        code: "// Ancien (Paper) :\n// Frame 1: JS calcule → envoie via bridge\n// Frame 2: Natif recoit → applique\n\n// Nouveau (Fabric) :\n// Frame 1: JS → C++ layout (Yoga) → natif applique",
        options: [
          "Parce que Fabric utilise CSS Grid au lieu de Flexbox",
          "Parce que le layout est calcule et applique dans le meme frame grace a Yoga en C++ et JSI synchrone, alors que le Bridge introduisait un retard d'au moins 1 frame",
          "Parce que Fabric desactive les animations pendant le layout",
          "Parce que Fabric pre-calcule tous les layouts au demarrage"
        ],
        answer: 1,
        explanation: "Avec le Bridge (Paper), le layout etait calcule en JS, serialise en JSON, envoye au natif et applique — au minimum 1 frame de retard. Avec Fabric, le layout est calcule par Yoga (C++), accessible via JSI de maniere synchrone, et les mutations sont appliquees dans le meme frame. Resultat : pas de flash visible entre l'etat calcule et l'etat affiche."
      },
      {
        label: "Question 4 — useTransition en React Native",
        text: "A quoi sert useTransition dans le contexte de Fabric ?",
        code: "function SearchScreen() {\n  const [query, setQuery] = useState('');\n  const [results, setResults] = useState([]);\n  const [isPending, startTransition] = useTransition();\n\n  function handleSearch(text) {\n    setQuery(text); // urgent\n    startTransition(() => {\n      setResults(heavyFilter(text)); // non-urgent\n    });\n  }\n}",
        options: [
          "Il anime la transition entre deux ecrans de navigation",
          "Il marque une mise a jour comme non-urgente, permettant a Fabric d'interrompre son rendu si une interaction urgente arrive (comme la saisie dans un TextInput)",
          "Il retarde l'execution d'une fonction de 16ms pour synchroniser avec le frame rate",
          "Il est inutile en React Native, il ne fonctionne que sur le web"
        ],
        answer: 1,
        explanation: "useTransition est une fonctionnalite de React 18+ activee par Fabric. Il permet de marquer une mise a jour d'etat comme non-urgente. Si l'utilisateur tape dans un TextInput pendant que le filtre est en cours de rendu, Fabric peut interrompre le rendu non-urgent et prioriser la mise a jour du TextInput. C'est le concurrent rendering."
      },
      {
        label: "Question 5 — Interop Layer",
        text: "Quel est le role de l'Interop Layer dans la New Architecture ?",
        code: null,
        options: [
          "Il convertit le code Swift en Kotlin automatiquement",
          "Il permet aux librairies ecrites pour l'ancien Bridge de fonctionner avec la New Architecture via un wrapper automatique Bridge ↔ JSI",
          "Il compile le JavaScript en code natif pour de meilleures performances",
          "Il traduit les composants React Native en composants web"
        ],
        answer: 1,
        explanation: "L'Interop Layer est un wrapper automatique qui traduit les appels Bridge en appels JSI et les composants Paper en composants Fabric. Il permet aux librairies non encore migrees de fonctionner avec la New Architecture sans modification. Il y a un leger cout de performance (conversion Bridge ↔ JSI), mais c'est transparent pour le developpeur."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
