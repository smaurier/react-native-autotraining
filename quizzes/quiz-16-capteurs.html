<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 16 — Capteurs et notifications</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 16 — Capteurs et notifications</h1>
    <p class="subtitle">expo-sensors, traitement de donnees, push notifications, taches en arriere-plan</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 8</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Accelerometre et New Architecture",
        text: "Comment expo-sensors transmet-il les donnees capteur au thread JS avec la New Architecture ?",
        code: "import { Accelerometer } from 'expo-sensors';\n\nAccelerometer.addListener((data) => {\n  console.log(data.x, data.y, data.z);\n});",
        options: [
          "Via le bridge asynchrone classique avec serialisation JSON",
          "Via les Turbo Modules (JSI) : appel synchrone C++ vers JS sans copie JSON, ce qui reduit la latence",
          "Via un WebSocket local entre le thread natif et JS",
          "Les donnees sont bufferisees et envoyees en batch toutes les secondes"
        ],
        answer: 1,
        explanation: "La New Architecture utilise les Turbo Modules bases sur JSI (JavaScript Interface). Les donnees capteur transitent directement de C++ vers JS via des appels synchrones, sans la serialisation JSON du bridge. Cela reduit significativement la latence pour les donnees haute frequence."
      },
      {
        label: "Question 2 — Filtre passe-bas",
        text: "Quel est l'effet du parametre alpha dans un filtre passe-bas sur les donnees capteur ?",
        code: "function lowPassFilter(current, previous, alpha) {\n  return {\n    x: alpha * current.x + (1 - alpha) * previous.x,\n    y: alpha * current.y + (1 - alpha) * previous.y,\n    z: alpha * current.z + (1 - alpha) * previous.z,\n  };\n}\n// alpha = 0.1 vs alpha = 0.9 ?",
        options: [
          "alpha n'a aucune influence, seul le nombre d'appels compte",
          "alpha proche de 0 = lissage fort (stable mais lent a reagir), alpha proche de 1 = lissage faible (reactif mais bruite)",
          "alpha proche de 1 = lissage fort, alpha proche de 0 = lissage faible",
          "alpha controle la frequence d'echantillonnage du capteur"
        ],
        answer: 1,
        explanation: "alpha controle le poids de la nouvelle valeur par rapport a l'ancienne. Un alpha proche de 0 donne beaucoup de poids a la valeur precedente (fort lissage, inertie). Un alpha proche de 1 donne beaucoup de poids a la nouvelle valeur (peu de lissage, reactif mais bruite)."
      },
      {
        label: "Question 3 — Detection de pas",
        text: "Pourquoi un detecteur de pas par accelerometre doit-il imposer un intervalle minimum entre deux detections ?",
        code: "// Magnitude de l'acceleration\nconst magnitude = Math.sqrt(x*x + y*y + z*z);\n\n// Sans intervalle minimum...\nif (magnitude > threshold && wasBelow) {\n  stepCount++; // Probleme ?\n}",
        options: [
          "Pour economiser la batterie en reduisant les calculs",
          "Pour eviter les faux positifs : un seul pas physique peut produire plusieurs oscillations de la magnitude au-dessus du seuil, et le bruit du capteur peut causer des pics parasites",
          "L'intervalle minimum est une convention sans justification technique",
          "Pour synchroniser la detection avec le taux de rafraichissement de l'ecran"
        ],
        answer: 1,
        explanation: "Un pas physique produit une onde d'acceleration qui peut osciller plusieurs fois au-dessus et en dessous du seuil. Sans intervalle minimum (~300ms, correspondant a une cadence de marche rapide), un seul pas serait compte 2 ou 3 fois. Le bruit du capteur amplifie ce probleme."
      },
      {
        label: "Question 4 — Push token",
        text: "Que se passe-t-il si vous appelez getExpoPushTokenAsync() sur un simulateur iOS ?",
        code: "const token = await Notifications.getExpoPushTokenAsync({\n  projectId: 'my-project-id',\n});\n// Sur simulateur iOS...",
        options: [
          "Le simulateur genere un faux token pour le developpement",
          "L'appel echoue car les push notifications necessitent un appareil physique — APNs ne delivre pas de token aux simulateurs",
          "Le token est genere mais les notifications ne sont jamais delivrees",
          "Le simulateur utilise automatiquement FCM au lieu d'APNs"
        ],
        answer: 1,
        explanation: "Apple Push Notification service (APNs) ne fonctionne pas sur les simulateurs iOS. L'appel a getExpoPushTokenAsync echoue avec une erreur. Il faut toujours verifier Device.isDevice avant de demander le token. Pour tester les notifications en local, utilisez scheduleNotificationAsync avec trigger: null."
      },
      {
        label: "Question 5 — Channels Android",
        text: "Pourquoi les channels de notification sont-ils obligatoires sur Android 8+ ?",
        code: "// Sans channel...\nawait Notifications.scheduleNotificationAsync({\n  content: { title: 'Hello', body: 'World' },\n  trigger: null,\n});\n// Resultat sur Android 8+ ?",
        options: [
          "Les channels sont optionnels, c'est juste une bonne pratique",
          "Android 8+ exige un channel pour chaque notification — sans channel, la notification est silencieusement ignoree. Les channels permettent a l'utilisateur de controler les preferences (son, vibration, importance) par categorie",
          "Les channels sont necessaires uniquement pour les notifications push, pas les locales",
          "Android cree automatiquement un channel 'default' si aucun n'est specifie"
        ],
        answer: 1,
        explanation: "Depuis Android 8.0 (API 26), chaque notification doit etre associee a un channel. Sans channel, la notification n'apparait pas. Les channels donnent le controle a l'utilisateur : il peut desactiver le son d'une categorie sans bloquer les autres. C'est une obligation du systeme, pas juste une bonne pratique."
      },
      {
        label: "Question 6 — Background tasks",
        text: "Pourquoi TaskManager.defineTask doit-il etre appele au niveau module et non dans un composant ?",
        code: "// Option A — dans le composant\nfunction App() {\n  TaskManager.defineTask('sync', async () => { ... });\n}\n\n// Option B — au niveau module\nTaskManager.defineTask('sync', async () => { ... });\nfunction App() { ... }",
        options: [
          "C'est une convention stylistique sans impact fonctionnel",
          "defineTask au niveau module est execute une seule fois au chargement du bundle, garantissant que la tache est definie avant que le systeme la declenche (meme si l'app est terminee et relancee en arriere-plan). Dans un composant, la definition depend du render et peut etre manquee",
          "Les composants ne peuvent pas acceder a TaskManager",
          "defineTask dans un composant cause une fuite memoire"
        ],
        answer: 1,
        explanation: "Quand le systeme declenche une tache en arriere-plan, il relance le bundle JS minimal. Si defineTask est dans un composant, il ne sera pas execute tant que le composant n'est pas monte — la tache echoue. Au niveau module, defineTask est execute des le chargement du bundle, avant tout render."
      },
      {
        label: "Question 7 — Fusion de capteurs",
        text: "Pourquoi un filtre complementaire combine-t-il accelerometre et gyroscope au lieu d'utiliser un seul capteur ?",
        code: "// Filtre complementaire\nfusedAngle = alpha * (gyroAngle) + (1 - alpha) * (accelAngle)\n// alpha ≈ 0.98",
        options: [
          "Pour doubler la precision de la mesure par redondance",
          "L'accelerometre est fiable a long terme mais sensible aux vibrations (bruit haute frequence), le gyroscope est precis a court terme mais derive dans le temps — le filtre complementaire exploite les forces de chacun pour compenser les faiblesses de l'autre",
          "Le filtre complementaire est obligatoire pour que expo-sensors fonctionne",
          "C'est une optimisation de batterie : chaque capteur est utilise a mi-puissance"
        ],
        answer: 1,
        explanation: "L'accelerometre mesure la gravite (reference absolue) mais est pollue par les vibrations et mouvements. Le gyroscope mesure la rotation avec precision a court terme mais derive progressivement (l'angle calcule s'eloigne de la realite). Le filtre complementaire utilise le gyroscope pour le court terme (alpha ≈ 0.98) et l'accelerometre pour corriger la derive."
      },
      {
        label: "Question 8 — Performance capteurs",
        text: "Quelle strategie evite les problemes de performance quand l'accelerometre met a jour a 60 Hz ?",
        code: "// Approche naive\nAccelerometer.setUpdateInterval(16); // 60 Hz\nAccelerometer.addListener((data) => {\n  setState(data); // 60 re-renders par seconde !\n});",
        options: [
          "Augmenter la memoire allouee au thread JS",
          "Stocker les donnees dans une ref (useRef) et mettre a jour l'UI a une frequence reduite (throttle/requestAnimationFrame), ou utiliser Animated.event avec useNativeDriver pour les animations directes",
          "Utiliser un Web Worker pour traiter les donnees capteur",
          "Desactiver le mode strict de React pour reduire les re-renders"
        ],
        answer: 1,
        explanation: "60 setState par seconde cause 60 re-renders — le thread JS est sature. La solution : stocker dans useRef (pas de re-render), puis mettre a jour l'UI soit par throttle (ex: max 10 Hz), soit par requestAnimationFrame, soit via Animated.event qui bypass entierement React pour les animations."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
