<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 17 — Animated API et LayoutAnimation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 17 — Animated API et LayoutAnimation</h1>
    <p class="subtitle">Animated.Value, timing, spring, decay, interpolation, combinaisons, LayoutAnimation, useNativeDriver</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 8</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Animated.Value et useRef",
        text: "Pourquoi faut-il utiliser useRef pour stocker un Animated.Value et non useState ?",
        code: "// Option A\nconst opacity = useState(new Animated.Value(0))[0];\n\n// Option B\nconst opacity = useRef(new Animated.Value(0)).current;",
        options: [
          "useState ne peut pas stocker d'objets, seulement des primitives",
          "Animated.Value est un objet mutable : useState ne detecte pas ses changements internes, et on ne veut PAS de re-render quand la valeur change — c'est le thread natif qui anime. useRef preserve la meme reference entre les renders sans declencher de re-render",
          "useRef est plus performant que useState pour tous les types de donnees",
          "Les deux approches sont equivalentes, c'est juste une convention"
        ],
        answer: 1,
        explanation: "Animated.Value est un objet mutable dont la valeur interne change pendant l'animation. useState garderait la meme reference (pas de re-render) ET poserait des problemes en Strict Mode (double initialisation). useRef est le bon choix : il preserve la reference sans re-render, ce qui est exactement le comportement souhaite puisque c'est le thread natif qui met a jour la propriete animee."
      },
      {
        label: "Question 2 — useNativeDriver",
        text: "Quelles proprietes sont supportees par useNativeDriver: true ?",
        code: "Animated.timing(value, {\n  toValue: 1,\n  duration: 300,\n  useNativeDriver: true, // Quelles proprietes ?\n});",
        options: [
          "Toutes les proprietes CSS sont supportees",
          "Uniquement opacity et les transform (translateX/Y, scale, rotate, skew) — les proprietes qui n'affectent pas le layout (pas de width, height, margin, padding, backgroundColor, borderRadius)",
          "Seulement opacity",
          "Les memes proprietes qu'avec useNativeDriver: false, mais executees sur le thread natif"
        ],
        answer: 1,
        explanation: "useNativeDriver: true envoie la definition de l'animation au thread natif, qui l'execute frame par frame sans communiquer avec JS. Seules les proprietes qui ne declenchent pas de recalcul de layout sont supportees : opacity et toutes les transform (translate, scale, rotate, skew). Les proprietes de layout (width, height, margin, padding) et visuelles complexes (backgroundColor, borderRadius) necessitent useNativeDriver: false."
      },
      {
        label: "Question 3 — Spring vs Timing",
        text: "Quand devrait-on preferer Animated.spring a Animated.timing ?",
        code: "// Timing\nAnimated.timing(scale, { toValue: 1, duration: 300, useNativeDriver: true });\n\n// Spring\nAnimated.spring(scale, { toValue: 1, tension: 40, friction: 7, useNativeDriver: true });",
        options: [
          "Spring est toujours preferable car il est plus performant",
          "Spring pour les reactions aux interactions utilisateur (geste, tap) car le rendu est organique et naturel. Timing pour les transitions automatiques (ecran, fade) ou la previsibilite temporelle est importante",
          "Timing pour les interactions car sa duree est deterministe, Spring pour le reste",
          "Il n'y a aucune difference fonctionnelle, c'est purement esthetique"
        ],
        answer: 1,
        explanation: "Spring simule la physique — le resultat semble naturel et organique, ideal pour les interactions humaines (bouton presse, element relache apres un drag). Timing donne un controle precis sur la duree, ideal pour les transitions orchestrees (changement d'ecran, apparition programmee). Spring n'a pas de duree fixe, il s'arrete quand l'equilibre est atteint."
      },
      {
        label: "Question 4 — Interpolation avec clamp",
        text: "Que retourne cette interpolation quand scrollY vaut 250 ?",
        code: "const opacity = scrollY.interpolate({\n  inputRange: [0, 200],\n  outputRange: [1, 0],\n  extrapolate: 'clamp',\n});\n\n// scrollY = 250 → opacity = ?",
        options: [
          "opacity = -0.25 (extrapolation lineaire au-dela de 200)",
          "opacity = 0 (clamp bloque la valeur a la borne inferieure de outputRange)",
          "opacity = 250 (retourne l'entree en mode identity)",
          "Erreur : la valeur est hors de l'inputRange"
        ],
        answer: 1,
        explanation: "Avec extrapolate: 'clamp', la sortie est bornee par les extremes de outputRange. Ici, inputRange va de 0 a 200 et outputRange de 1 a 0. Pour scrollY = 250 (au-dela de 200), la valeur est plafonnee a 0 (le minimum de outputRange). Sans clamp, la valeur serait -0.25 (extrapolation lineaire)."
      },
      {
        label: "Question 5 — Animated.stagger",
        text: "Comment fonctionne Animated.stagger et quel est son effet visuel ?",
        code: "Animated.stagger(100, [\n  Animated.timing(anim1, { toValue: 1, duration: 300, useNativeDriver: true }),\n  Animated.timing(anim2, { toValue: 1, duration: 300, useNativeDriver: true }),\n  Animated.timing(anim3, { toValue: 1, duration: 300, useNativeDriver: true }),\n]).start();",
        options: [
          "Les trois animations s'executent en sequence (l'une apres l'autre), duree totale = 900ms",
          "Les trois animations demarrent en meme temps, comme parallel",
          "Chaque animation demarre avec 100ms de decalage : anim1 a t=0, anim2 a t=100, anim3 a t=200, creant un effet d'apparition en cascade. Duree totale = 200 + 300 = 500ms",
          "Les animations sont melangees aleatoirement"
        ],
        answer: 2,
        explanation: "Animated.stagger est comme parallel, mais avec un delai entre chaque demarrage. Ici, anim1 demarre a 0ms, anim2 a 100ms, anim3 a 200ms. Chacune dure 300ms, donc la duree totale est 200 + 300 = 500ms. L'effet visuel est une apparition en cascade — tres utilise pour les listes."
      },
      {
        label: "Question 6 — LayoutAnimation",
        text: "Quelle est la limite principale de LayoutAnimation par rapport a l'Animated API ?",
        code: "// LayoutAnimation\nLayoutAnimation.configureNext(LayoutAnimation.Presets.easeInEaseOut);\nsetExpanded(!expanded);\n\n// vs Animated API\nAnimated.timing(height, { toValue: 200, duration: 300, useNativeDriver: false }).start();",
        options: [
          "LayoutAnimation ne fonctionne pas sur iOS",
          "LayoutAnimation ne fonctionne pas avec les couleurs",
          "LayoutAnimation ne permet pas d'annuler une animation en cours, ne supporte pas les gestes, et est experimental sur Android. Il anime tous les changements de layout du prochain render, sans controle granulaire",
          "LayoutAnimation est plus lent que l'Animated API"
        ],
        answer: 2,
        explanation: "LayoutAnimation est tres simple (une ligne) mais offre peu de controle : pas d'annulation (.stop()), pas de lien avec les gestes, anime TOUS les changements de layout (pas un seul element). Sur Android, il necessite UIManager.setLayoutAnimationEnabledExperimental(true) et peut causer des bugs avec FlatList. L'Animated API offre un controle total par valeur."
      },
      {
        label: "Question 7 — scrollEventThrottle",
        text: "Pourquoi scrollEventThrottle={16} est-il necessaire sur iOS avec Animated.event ?",
        code: "<Animated.ScrollView\n  onScroll={Animated.event(\n    [{ nativeEvent: { contentOffset: { y: scrollY } } }],\n    { useNativeDriver: true }\n  )}\n  // scrollEventThrottle={16} manquant !\n>",
        options: [
          "scrollEventThrottle n'a aucun effet avec useNativeDriver: true",
          "Sur iOS, sans scrollEventThrottle, les evenements scroll sont envoyes de maniere sporadique (pas a chaque frame). Avec 16ms (= 60 fps), chaque frame de scroll envoie un evenement, garantissant une animation fluide",
          "scrollEventThrottle est necessaire uniquement sur Android",
          "La valeur 16 est arbitraire, n'importe quelle valeur fonctionne"
        ],
        answer: 1,
        explanation: "iOS optimise par defaut en n'envoyant pas d'evenement scroll a chaque frame — cela economise des ressources. Mais pour les animations liees au scroll, on a besoin de chaque frame. scrollEventThrottle={16} (16ms = 1 frame a 60fps) force iOS a envoyer un evenement a chaque frame. Sur Android, les evenements sont envoyes a chaque frame par defaut."
      },
      {
        label: "Question 8 — Erreur courante : mixer les drivers",
        text: "Que se passe-t-il si vous utilisez useNativeDriver: true puis useNativeDriver: false sur la meme Animated.Value ?",
        code: "const value = useRef(new Animated.Value(0)).current;\n\n// Animation 1\nAnimated.timing(value, { toValue: 1, useNativeDriver: true }).start();\n\n// Plus tard...\nAnimated.timing(value, { toValue: 0, useNativeDriver: false }).start();",
        options: [
          "La deuxieme animation ecrase la premiere sans probleme",
          "L'application crash avec l'erreur 'Attempting to run JS driven animation on animated node that has been driven by native animation' — une meme Animated.Value ne peut pas changer de driver",
          "La valeur est animee par les deux drivers en parallele",
          "React Native choisit automatiquement le meilleur driver"
        ],
        answer: 1,
        explanation: "Une Animated.Value est assignee a un seul driver (natif OU JS) lors de sa premiere animation. Tenter de changer de driver cause un crash. Solution : utiliser deux Animated.Value separees, ou toujours utiliser le meme driver pour une meme valeur."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
